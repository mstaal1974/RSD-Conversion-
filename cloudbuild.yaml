# cloudbuild.yaml
# Triggered on push to main — builds, tests, and deploys to Cloud Run.
#
# Required Cloud Build service account permissions:
#   - roles/run.admin
#   - roles/iam.serviceAccountUser
#   - roles/artifactregistry.writer
#   - roles/secretmanager.secretAccessor
#
# Substitution variables (set in Cloud Build trigger or here as defaults):
substitutions:
  _REGION: australia-southeast1
  _SERVICE: rsd-convert
  _REPO: rsd-convert
  _IMAGE: rsd-convert-app

steps:
  # ── 1. Run tests ────────────────────────────────────────────────────────────
  - id: test
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet -r requirements.txt pytest
        python -m pytest tests/ -v --tb=short
    waitFor: ["-"]   # start immediately

  # ── 2. Build container image ─────────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest
      - .
    waitFor: [test]

  # ── 3. Push image ────────────────────────────────────────────────────────────
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}
    waitFor: [build]

  # ── 4. Deploy to Cloud Run ───────────────────────────────────────────────────
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --cpu=2
      - --memory=2Gi
      - --timeout=3600          # 60-min timeout for long batch runs
      - --set-secrets=OPENAI_API_KEY=openai-api-key:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,DATABASE_URL=database-url:latest
      - --set-env-vars=STREAMLIT_SERVER_HEADLESS=true,STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    waitFor: [push]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest

options:
  logging: LEGACY
  machineType: E2_HIGHCPU_8

timeout: 1800s  # 30-min build timeout
